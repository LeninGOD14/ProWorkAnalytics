<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Formulario Tarea | ProWork Analytics</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f3f4f6;
        }

        header {
            background: linear-gradient(90deg, #0f172a, #1e293b);
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        .supervisor-badge {
            background-color: #2563eb;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .user-info {
            text-align: right;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 6px;
            background-color: #374151;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .container {
            padding: 40px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            color: #1e3a8a;
        }

        label {
            font-weight: 500;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: white;
        }

        .btn-primary {
            background-color: #2563eb;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-secondary {
            background-color: #6b7280;
        }

        .btn-secondary:hover {
            background-color: #4b5563;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>

<body>

<header>
    <h1>
        ProWork Analytics
        <span class="supervisor-badge">SUPERVISOR</span>
    </h1>

    <div class="user-info">
        Usuario: <span sec:authentication="name"></span><br>
        Rol activo: <strong>SUPERVISOR</strong>
        <form th:action="@{/logout}" method="post">
            <button class="logout-btn" type="submit">Cerrar sesión</button>
        </form>
    </div>
</header>

<div class="container">
    <div class="card">

        <h2 th:text="${tarea.id == null ? 'Nueva Tarea' : 'Editar Tarea'}"></h2>

        <form th:action="@{/supervisor/catalogo-tareas/guardar}"
              th:object="${tarea}"
              method="post">

            <input type="hidden" th:field="*{id}" />

            <label>Nombre:</label>
            <input type="text" th:field="*{nombre}" required>

            <br><br>

            <label>Descripción:</label>
            <textarea th:field="*{descripcion}" required></textarea>

            <br><br>

            <label>Dificultad:</label>
            <select th:field="*{dificultad}" required>
                <option value="">Seleccione dificultad</option>
                <option value="BAJA">Baja</option>
                <option value="MEDIA">Media</option>
                <option value="ALTA">Alta</option>
            </select>

            <div class="actions">
                <button type="submit" class="btn btn-primary">
                    Guardar
                </button>

                <a th:href="@{/supervisor}" class="btn btn-secondary">
                    Cancelar
                </a>
            </div>

        </form>

    </div>
</div>

<footer>
    ProWork Analytics © 2026 | Módulo Supervisor
</footer>

</body>
</html>
