<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head>
        <meta charset="UTF-8">
        <title>Tareas Asignadas | ProWork Analytics</title>

        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", Arial, sans-serif;
                background-color: #f3f4f6;
            }

            header {
                background: linear-gradient(90deg, #0f172a, #1e293b);
                color: white;
                padding: 18px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            header h1 {
                margin: 0;
                font-size: 22px;
            }

            .admin-badge {
                background-color: #2563eb;
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 12px;
                font-weight: bold;
                margin-left: 10px;
            }

            .user-info {
                text-align: right;
                font-size: 14px;
            }

            .logout-btn {
                margin-top: 6px;
                background-color: #374151;
                border: none;
                color: white;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
            }

            .container {
                padding: 40px 60px;
                width: 95%;
                max-width: 1500px;
                margin: auto;
            }

            .card {
                background-color: white;
                border-radius: 10px;
                padding: 30px;
                box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            }

            h2 {
                margin-top: 0;
                color: #1e3a8a;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                background-color: white;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            }

            th, td {
                border: 1px solid #d1d5db;
                padding: 12px 15px;
                text-align: left;
            }

            th {
                background-color: #1e293b;
                color: white;
                font-weight: 600;
            }


            tr:nth-child(even) {
                background-color: #f9fafb;
            }

            .estado {
                font-weight: bold;
            }

            .estado.PENDIENTE {
                color: #dc2626;
            }

            .estado.EN_PROCESO {
                color: #f59e0b;
            }

            .estado.COMPLETADA {
                color: #16a34a;
            }

            .top-actions {
                margin-top: 25px;
            }

            .btn-secondary {
                background-color: #6b7280;
                color: white;
                padding: 10px 15px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 500;
            }

            .btn-secondary:hover {
                background-color: #4b5563;
            }

            .btn {
                padding: 6px 12px;
                border-radius: 6px;
                font-size: 13px;
                text-decoration: none;
                color: white;
                font-weight: 500;
                margin-right: 4px;
            }

            .btn-edit {
                background-color: #2563eb;
            }

            .btn-edit:hover {
                background-color: #1d4ed8;
            }

            .btn-delete {
                background-color: #dc2626;
            }

            .btn-delete:hover {
                background-color: #b91c1c;
            }


            footer {
                text-align: center;
                margin-top: 20px;
                margin-bottom: 20px;
                font-size: 12px;
                color: #9ca3af;
            }
        </style>
    </head>

    <body>

        <header>
            <h1>
                ProWork Analytics
                <span class="admin-badge">SUPERVISOR</span>
            </h1>

            <div class="user-info">
                Usuario: <span sec:authentication="name"></span><br>
                Rol activo: <strong>SUPERVISOR</strong>
                <form th:action="@{/logout}" method="post">
                    <button class="logout-btn" type="submit">Cerrar sesión</button>
                </form>
            </div>
        </header>

        <div class="container">
            <div class="card">
                <h2>📋 Tareas Asignadas</h2>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tarea</th>
                            <th>Descripción</th>
                            <th>Operario</th>
                            <th>Fecha</th>
                            <th>Dificultad</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="a : ${asignaciones}">
                            <td th:text="${a.id}"></td>
                            <td th:text="${a.tarea.nombre}"></td>
                            <td th:text="${a.tarea.descripcion}"></td>
                            <td th:text="${a.operario.username}"></td>
                            <td th:text="${a.fechaAsignacion}"></td>
                            <td th:text="${a.tarea.dificultad}"></td>

                            <td>
                                <span class="estado PENDIENTE"
                                      th:if="${a.horaInicio == null}">
                                    Pendiente
                                </span>

                                <span class="estado EN_PROCESO"
                                      th:if="${a.horaInicio != null and a.horaFin == null}">
                                    En proceso
                                </span>

                                <span class="estado COMPLETADA"
                                      th:if="${a.horaFin != null}">
                                    Completada
                                </span>
                            </td>

                            <td>

                                <a th:href="@{/supervisor/asignaciones/eliminar/{id}(id=${a.id})}"
                                   class="btn btn-delete"
                                   onclick="return confirm('¿Seguro que deseas eliminar esta asignación?');">
                                    Eliminar
                                </a>

                            </td>


                        </tr>

                        <tr th:if="${#lists.isEmpty(asignaciones)}">
                            <td colspan="8">No existen tareas asignadas</td>
                        </tr>
                    </tbody>
                </table>

                <div class="top-actions">
                    <a th:href="@{/supervisor}" class="btn-secondary">Regresar</a>
                </div>
            </div>
        </div>

        <footer>
            ProWork Analytics © 2026 | Módulo Supervisor
        </footer>

    </body>
</html>
