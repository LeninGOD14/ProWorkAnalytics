<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head>
        <meta charset="UTF-8">
        <title>Lista de Supervisores | ProWork Analytics</title>

        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", Arial, sans-serif;
                background-color: #f3f4f6;
            }

            header {
                background: linear-gradient(90deg, #0f172a, #1e293b);
                color: white;
                padding: 18px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            header h1 {
                margin: 0;
                font-size: 22px;
            }

            .admin-badge {
                background-color: #dc2626;
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 12px;
                font-weight: bold;
                margin-left: 10px;
            }

            .user-info {
                text-align: right;
                font-size: 14px;
            }

            .logout-btn {
                margin-top: 6px;
                background-color: #374151;
                border: none;
                color: white;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
            }

            .container {
                padding: 40px;
                max-width: 800px;
                margin: auto;
            }

            .card {
                background-color: white;
                border-radius: 10px;
                padding: 30px;
                box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            }

            h2 {
                margin-top: 0;
                color: #1e3a8a;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                background-color: white;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            }

            th, td {
                border: 1px solid #d1d5db;
                padding: 12px 15px;
                text-align: left;
            }

            th {
                background-color: #1e293b;
                color: white;
                font-weight: 600;
            }

            tr:nth-child(even) {
                background-color: #f9fafb;
            }

            .btn-action {
                padding: 6px 12px;
                border-radius: 6px;
                text-decoration: none;
                color: white;
                font-weight: 500;
                font-size: 13px;
                margin-right: 6px;
            }

            .btn-edit {
                background-color: #2563eb;
            }

            .btn-edit:hover {
                background-color: #1d4ed8;
            }

            .btn-delete {
                background-color: #dc2626;
            }

            .btn-delete:hover {
                background-color: #b91c1c;
            }

            .top-actions {
                margin-top: 15px;
            }

            .btn-secondary {
                background-color: #6b7280;
                color: white;
                padding: 10px 15px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 500;
            }

            .btn-secondary:hover {
                background-color: #4b5563;
            }

            footer {
                text-align: center;
                margin-top: 15px;
                padding-bottom: 20px;
                font-size: 12px;
                color: #9ca3af;
            }
        </style>
    </head>

    <body>

        <header>
            <h1>
                ProWork Analytics
                <span class="admin-badge">ADMIN</span>
            </h1>

            <div class="user-info">
                Usuario: <span sec:authentication="name"></span><br>
                Rol activo: <strong>ADMIN</strong>
                <form th:action="@{/logout}" method="post">
                    <button class="logout-btn" type="submit">Cerrar sesión</button>
                </form>
            </div>
        </header>

        <div class="container">
            <div class="card">
                <h2>Lista de Supervisores</h2>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sup : ${supervisores}">
                            <td th:text="${sup.id}"></td>
                            <td th:text="${sup.username}"></td>
                            <td>
                                <a th:href="@{/admin/supervisores/editar/{id}(id=${sup.id})}"
                                   class="btn-action btn-edit">Editar</a>

                                <a th:href="@{/admin/supervisores/eliminar/{id}(id=${sup.id})}"
                                   onclick="return confirm('¿Seguro que deseas eliminar este supervisor?')"
                                   class="btn-action btn-delete">Eliminar</a>
                            </td>
                        </tr>


                        <tr th:if="${#lists.isEmpty(supervisores)}">
                            <td colspan="3" style="text-align:left;">No hay supervisores creados todavía</td>
                        </tr>
                    </tbody>
                </table>

                <div class="top-actions">
                    <a th:href="@{/admin}" class="btn-secondary">Regresar</a>
                </div>

            </div>
        </div>

        <footer>
            ProWork Analytics © 2026 | Módulo Administrador
        </footer>

    </body>
</html>
