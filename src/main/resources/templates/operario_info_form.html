<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head>
        <meta charset="UTF-8">
        <title>Formulario Operario | ProWork Analytics</title>

        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", Arial, sans-serif;
                background-color: #f3f4f6;
            }

            header {
                background: linear-gradient(90deg, #0f172a, #1e293b);
                color: white;
                padding: 18px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            header h1 {
                margin: 0;
                font-size: 22px;
            }

            .supervisor-badge {
                background-color: #2563eb;
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 12px;
                font-weight: bold;
                margin-left: 10px;
            }

            .user-info {
                text-align: right;
                font-size: 14px;
            }

            .logout-btn {
                margin-top: 6px;
                background-color: #374151;
                border: none;
                color: white;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
            }

            .container {
                max-width: 600px;
                margin: 40px auto;
                padding: 30px;
                background-color: white;
                border-radius: 10px;
                box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            }

            h2 {
                color: #1e3a8a;
                margin-top: 0;
            }

            form {
                display: flex;
                flex-direction: column;
            }

            label {
                margin-top: 15px;
                margin-bottom: 5px;
                font-weight: 500;
            }

            input, select {
                padding: 10px;
                border-radius: 6px;
                border: 1px solid #d1d5db;
                font-size: 14px;
                font-family: "Segoe UI", Arial, sans-serif;
            }

            .btn-group {
                display: flex;
                gap: 12px;
                margin-top: 25px;
            }

            .btn-submit {
                flex: 1;
                padding: 12px;
                border-radius: 6px;
                border: none;
                background-color: #2563eb;
                color: white;
                font-weight: 500;
                font-size: 14px;
                font-family: "Segoe UI", Arial, sans-serif;
                text-align: center;
                cursor: pointer;
            }

            .btn-submit:hover {
                background-color: #1d4ed8;
            }

            .btn-back {
                flex: 1;
                padding: 12px;
                border-radius: 6px;
                border: none;
                background-color: #6b7280;
                color: white;
                font-weight: 500;
                font-size: 14px;
                font-family: "Segoe UI", Arial, sans-serif;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                cursor: pointer;
            }

            .btn-back:hover {
                background-color: #4b5563;
            }

            footer {
                text-align: center;
                margin-top: 4px;
                margin-bottom: 20px;
                font-size: 12px;
                color: #9ca3af;
            }

        </style>
    </head>

    <body>

        <header>
            <h1>
                ProWork Analytics
                <span class="supervisor-badge">SUPERVISOR</span>
            </h1>

            <div class="user-info">
                Usuario: <span sec:authentication="name"></span><br>
                Rol activo: <strong>SUPERVISOR</strong>
                <form th:action="@{/logout}" method="post">
                    <button class="logout-btn" type="submit">Cerrar sesión</button>
                </form>
            </div>
        </header>

        <div class="container">
            <h2 th:text="${(operarioInfo.id != null) ? 'Editar Operario' : 'Nuevo Operario'}"></h2>

            <form th:action="@{(${operarioInfo.id} != null) ? '/supervisor/operarios/info/editar/' + ${operarioInfo.id} : '/supervisor/operarios/info/nuevo'}"
                  th:object="${operarioInfo}" method="post">

                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}" required />

                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" th:field="*{apellido}" required />

                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" th:field="*{telefono}" required />

                <label for="correo">Correo</label>
                <input type="email" id="correo" th:field="*{correo}" required />

                <label for="turno">Turno</label>
                <select id="turno" th:field="*{turno}">
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>

                <label for="estado">Estado</label>
                <select id="estado" th:field="*{estado}">
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                </select>

                <label for="fechaIngreso">Fecha de Ingreso</label>
                <input type="date" id="fechaIngreso" th:field="*{fechaIngreso}" required />

                <div class="btn-group">
                    <button type="submit" class="btn-submit"
                            th:text="${(operarioInfo.id != null) ? 'Actualizar' : 'Guardar'}">
                        Guardar
                    </button>
                    <a th:href="@{/supervisor}" class="btn-back">Regresar</a>
                </div>

            </form>
        </div>

        <footer>
            ProWork Analytics © 2026 | Módulo Supervisor
        </footer>

    </body>
</html>
