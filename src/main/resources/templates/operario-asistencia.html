<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head>
        <meta charset="UTF-8">
        <title>Asistencia | ProWork Analytics</title>

        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", Arial, sans-serif;
                background-color: #f3f4f6;
            }

            header {
                background: linear-gradient(90deg, #0f172a, #1e293b);
                color: white;
                padding: 18px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            header h1 {
                margin: 0;
                font-size: 22px;
            }

            .role-badge {
                background-color: #16a34a;
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 12px;
                font-weight: bold;
                margin-left: 10px;
            }

            .user-info {
                text-align: right;
                font-size: 14px;
            }

            .logout-btn {
                margin-top: 6px;
                background-color: #374151;
                border: none;
                color: white;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
            }

            .container {
                padding: 40px;
                max-width: 500px;
                margin: auto;
            }

            .card {
                background-color: white;
                border-radius: 10px;
                padding: 30px;
                box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            }

            h2 {
                margin-top: 0;
                color: #1e3a8a;
            }

            .info {
                margin: 15px 0;
                font-size: 14px;
                color: #374151;
            }

            .time {
                font-weight: bold;
                color: #111827;
            }

            .actions {
                margin-top: 25px;
                display: flex;
                gap: 10px;
            }

            .btn {
                flex: 1;
                text-align: center;
                padding: 10px 20px; 
                min-width: 180px;    
                border-radius: 6px;
                font-size: 14px;
                font-weight: 500;
                color: white;
                text-decoration: none;
                cursor: pointer;
                border: none;
                white-space: nowrap; 
            }


            .btn-primary {
                background-color: #2563eb;
            }

            .btn-primary:hover {
                background-color: #1d4ed8;
            }

            .btn-success {
                background-color: #16a34a;
            }

            .btn-success:hover {
                background-color: #15803d;
            }

            .btn-secondary {
                background-color: #6b7280;
            }

            .btn-secondary:hover {
                background-color: #4b5563;
            }

            footer {
                text-align: center;
                margin-top: 50px;
                font-size: 12px;
                color: #9ca3af;
            }
        </style>
    </head>

    <body>

        <header>
            <h1>
                ProWork Analytics
                <span class="role-badge">OPERARIO</span>
            </h1>

            <div class="user-info">
                Usuario: <span sec:authentication="name"></span><br>
                Rol activo: <strong>OPERARIO</strong>
                <form th:action="@{/logout}" method="post">
                    <button class="logout-btn" type="submit">Cerrar sesión</button>
                </form>
            </div>
        </header>

        <div class="container">
            <div class="card">
                <h2>Registro de Asistencia</h2>

                <div th:if="${asistencia == null || asistencia.horaEntrada == null}">
                    <p class="info">Aún no has registrado tu entrada del día.</p>

                    <div class="actions">
                        <form th:action="@{/operario/asistencia/entrada}" method="post" style="flex:1;">
                            <button type="submit" class="btn btn-primary">Marcar Entrada</button>
                        </form>
                        <a th:href="@{/operario}" class="btn btn-secondary">Volver</a>
                    </div>
                </div>

                <div th:if="${asistencia != null && asistencia.horaEntrada != null && asistencia.horaSalida == null}">
                    <p class="info">
                        Hora de entrada:
                        <span class="time"
                              th:text="${#temporals.format(asistencia.horaEntrada,'HH:mm:ss')}"></span>
                    </p>

                    <div class="actions">
                        <form th:action="@{/operario/asistencia/salida}" method="post" style="flex:1;">
                            <button type="submit" class="btn btn-success">Marcar Salida</button>
                        </form>
                        <a th:href="@{/operario}" class="btn btn-secondary">Volver</a>
                    </div>
                </div>

                <div th:if="${asistencia != null && asistencia.horaSalida != null}">
                    <p class="info">
                        Entrada:
                        <span class="time"
                              th:text="${#temporals.format(asistencia.horaEntrada,'HH:mm:ss')}"></span>
                    </p>
                    <p class="info">
                        Salida:
                        <span class="time"
                              th:text="${#temporals.format(asistencia.horaSalida,'HH:mm:ss')}"></span>
                    </p>

                    <p class="info">Asistencia registrada correctamente ✅</p>

                    <div class="actions">
                        <a th:href="@{/operario}" class="btn btn-secondary">Regresar</a>
                    </div>
                </div>

            </div>
        </div>

        <footer>
            ProWork Analytics © 2026 | Módulo Operario
        </footer>

    </body>
</html>
