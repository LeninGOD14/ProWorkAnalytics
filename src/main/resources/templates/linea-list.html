<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head>
        <meta charset="UTF-8">
        <title>Líneas de Producción | ProWork Analytics</title>

        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", Arial, sans-serif;
                background-color: #f3f4f6;
            }

            header {
                background: linear-gradient(90deg, #0f172a, #1e293b);
                color: white;
                padding: 18px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            header h1 {
                margin: 0;
                font-size: 22px;
            }

            .admin-badge {
                background-color: #dc2626;
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 12px;
                font-weight: bold;
                margin-left: 10px;
            }

            .user-info {
                text-align: right;
                font-size: 14px;
            }

            .logout-btn {
                margin-top: 6px;
                background-color: #374151;
                border: none;
                color: white;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
            }

            .container {
                padding: 40px;
                max-width: 900px;
                margin: auto;
            }

            h2 {
                color: #1e3a8a;
                margin-top: 0;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                background-color: white;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            }

            th, td {
                padding: 12px 15px;
                text-align: left;
            }

            th {
                background-color: #1e293b;
                color: white;
                font-weight: 600;
            }

            tr:nth-child(even) {
                background-color: #f3f4f6;
            }

            .btn {
                text-decoration: none;
                padding: 6px 12px;
                border-radius: 6px;
                font-size: 14px;
                font-weight: 500;
                color: white;
                margin-right: 5px;
            }

            .btn-primary {
                background-color: #2563eb;
            }

            .btn-primary:hover {
                background-color: #1d4ed8;
            }

            .btn-danger {
                background-color: #dc2626;
            }

            .btn-danger:hover {
                background-color: #b91c1c;
            }

            .btn-secondary {
                background-color: #6b7280;
            }

            .btn-secondary:hover {
                background-color: #4b5563;
            }

            footer {
                text-align: center;
                margin-top: 50px;
                font-size: 12px;
                color: #9ca3af;
            }

            .top-actions {
                margin-top: 15px;
            }

            .btn-secondary {
                background-color: #6b7280;
                color: white;
                padding: 10px 15px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 500;
            }

            .btn-secondary:hover {
                background-color: #4b5563;
            }


        </style>
    </head>

    <body>

        <header>
            <h1>
                ProWork Analytics
                <span class="admin-badge" sec:authorize="hasRole('ADMIN')">ADMIN</span>
                <span class="admin-badge" sec:authorize="hasRole('SUPERVISOR')"
                      style="background:#2563eb;">SUPERVISOR</span>
            </h1>

            <div class="user-info">
                Usuario: <span sec:authentication="name"></span><br>
                Rol activo:
                <strong sec:authorize="hasRole('ADMIN')">ADMIN</strong>
                <strong sec:authorize="hasRole('SUPERVISOR')">SUPERVISOR</strong>
                <form th:action="@{/logout}" method="post">
                    <button class="logout-btn" type="submit">Cerrar sesión</button>
                </form>
            </div>
        </header>

        <div class="container">
            <h2>Lista de Líneas de Producción</h2>

            <div th:if="${mensajeError}"
                 style="background:#fee2e2; color:#991b1b; padding:12px; border-radius:6px; margin-bottom:15px;">
                <strong>Error:</strong> <span th:text="${mensajeError}"></span>
            </div>

            <div th:if="${mensajeExito}"
                 style="background:#dcfce7; color:#166534; padding:12px; border-radius:6px; margin-bottom:15px;">
                <span th:text="${mensajeExito}"></span>
            </div>


            <table>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Fecha Creación</th>
                    <th>Acciones</th>
                </tr>
                <tbody>
                    <tr th:each="linea : ${lineas}">
                        <td th:text="${linea.id}"></td>
                        <td th:text="${linea.codigo}"></td>
                        <td th:text="${linea.nombre}"></td>
                        <td th:text="${linea.fechaCreacion}"></td>

                        <td>
                            <a th:href="@{/admin/lineas/editar/{id}(id=${linea.id})}"
                               class="btn btn-primary">Editar</a>
                            <a th:href="@{/supervisor/lineas-supervisor/eliminar/{id}(id=${linea.id})}"
                               onclick="return confirm('¿Seguro que deseas eliminar esta línea?')"
                               class="btn btn-danger">Eliminar</a>

                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(lineas)}">
                        <td colspan="5">No existen lineas creadas</td>
                    </tr>
                </tbody>
            </table>

            <div class="top-actions" style="margin-top: 20px;">
                <a th:href="@{${#authorization.expression('hasRole(''ADMIN'')') ? '/admin' : '/supervisor'}}"
                   class="btn-secondary">Regresar</a>
            </div>


        </div>

        <footer>
            <span sec:authorize="hasRole('ADMIN')">
                ProWork Analytics © 2026 | Módulo Administrador
            </span>

            <span sec:authorize="hasRole('SUPERVISOR')">
                ProWork Analytics © 2026 | Módulo Supervisor
            </span>
        </footer>


    </body>
</html>
