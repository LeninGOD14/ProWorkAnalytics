<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head>
        <meta charset="UTF-8">
        <title>Catálogo de Tareas | ProWork Analytics</title>

        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", Arial, sans-serif;
                background-color: #f3f4f6;
            }

            header {
                background: linear-gradient(90deg, #0f172a, #1e293b);
                color: white;
                padding: 18px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            header h1 {
                margin: 0;
                font-size: 22px;
            }

            .supervisor-badge {
                background-color: #2563eb;
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 12px;
                font-weight: bold;
                margin-left: 10px;
            }

            .user-info {
                text-align: right;
                font-size: 14px;
            }

            .logout-btn {
                margin-top: 6px;
                background-color: #374151;
                border: none;
                color: white;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
            }

            .container {
                padding: 40px;
                max-width: 1300px;
                margin: auto;
            }

            .title {
                font-size: 24px;
                margin-bottom: 10px;
                color: #1e3a8a;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                background-color: white;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            }

            th, td {
                padding: 14px;
                text-align: left;
                font-size: 14px;
            }

            th {
                background-color: #1e293b;
                color: white;
            }

            tr:nth-child(even) {
                background-color: #f9fafb;
            }

            .btn {
                padding: 6px 12px;
                border-radius: 6px;
                font-size: 13px;
                text-decoration: none;
                color: white;
                font-weight: 500;
                margin-right: 4px;
            }

            .btn-edit {
                background-color: #2563eb;
            }

            .btn-edit:hover {
                background-color: #1d4ed8;
            }

            .btn-delete {
                background-color: #dc2626;
            }

            .btn-delete:hover {
                background-color: #b91c1c;
            }

            .top-actions {
                margin-top: 20px;
            }

            .btn-secondary {
                background-color: #6b7280;
                color: white;
                padding: 10px 15px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 500;
            }

            .btn-secondary:hover {
                background-color: #4b5563;
            }

            footer {
                text-align: center;
                margin-top: 20px;
                font-size: 12px;
                color: #9ca3af;
            }
        </style>
    </head>

    <body>

        <header>
            <h1>
                ProWork Analytics
                <span class="supervisor-badge">SUPERVISOR</span>
            </h1>

            <div class="user-info">
                Usuario: <span sec:authentication="name"></span><br>
                Rol activo: <strong>SUPERVISOR</strong>
                <form th:action="@{/logout}" method="post">
                    <button class="logout-btn" type="submit">Cerrar sesión</button>
                </form>
            </div>
        </header>

        <div class="container">

            <div class="title">Catálogo de Tareas</div>

            <div th:if="${mensajeError}"
                 style="background:#fee2e2; color:#991b1b; padding:12px; border-radius:6px; margin-bottom:15px;">
                <strong>Error:</strong> <span th:text="${mensajeError}"></span>
            </div>

            <div th:if="${mensajeExito}"
                 style="background:#dcfce7; color:#166534; padding:12px; border-radius:6px; margin-bottom:15px;">
                <span th:text="${mensajeExito}"></span>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Dificultad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="tarea : ${tareas}">
                        <td th:text="${tarea.id}"></td>
                        <td th:text="${tarea.nombre}"></td>
                        <td th:text="${tarea.descripcion}"></td>

                        <!-- 👇 FORMATEO BONITO -->
                        <td th:text="${tarea.dificultad != null ? tarea.dificultad : 'Sin definir'}"></td>


                        <td>
                            <a th:href="@{/supervisor/catalogo-tareas/editar/{id}(id=${tarea.id})}"
                               class="btn btn-edit">Editar</a>

                            <a th:href="@{/supervisor/catalogo-tareas/eliminar/{id}(id=${tarea.id})}"
                               class="btn btn-delete"
                               onclick="return confirm('¿Seguro que deseas eliminar esta tarea?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(tareas)}">
                        <td colspan="5">No hay tareas registradas.</td>
                    </tr>
                </tbody>
            </table>

            <div class="top-actions">
                <a th:href="@{/supervisor}" class="btn-secondary">Regresar</a>
            </div>

        </div>

        <footer>
            ProWork Analytics © 2026 | Módulo Supervisor
        </footer>

    </body>
</html>
